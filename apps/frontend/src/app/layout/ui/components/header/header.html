<header
    class="sticky top-0 z-40 flex w-full border-gray-200 bg-white lg:border-b dark:border-gray-800 dark:bg-gray-900"
>
    <div class="flex grow items-center justify-between px-3 py-3 lg:px-6">
        <div class="flex items-center gap-3">
            <!-- Sidebar toggler -->
            <button
                (click)="handleToggle()"
                class="flex h-10 w-10 items-center justify-center rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-100 dark:border-gray-800 dark:text-gray-400 dark:hover:bg-gray-800"
                aria-label="Toggle sidebar"
            >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        fill-rule="evenodd"
                        clip-rule="evenodd"
                        d="M3 6.75A.75.75 0 013.75 6h16.5a.75.75 0 010 1.5H3.75A.75.75 0 013 6.75zm0 5.25a.75.75 0 01.75-.75h16.5a.75.75 0 010 1.5H3.75A.75.75 0 013 12zm.75 4.5a.75.75 0 000 1.5h16.5a.75.75 0 000-1.5H3.75z"
                        fill="currentColor"
                    ></path>
                </svg>
            </button>

            <span class="text-lg font-semibold text-gray-800 dark:text-white/90 lg:hidden">GitPaaS</span>
        </div>

        <div class="flex items-center gap-3">
            <app-theme-toggle-button />

            <div class="relative">
                <button
                    type="button"
                    (click)="toggleUserMenu()"
                    [attr.aria-expanded]="isUserMenuOpen()"
                    aria-haspopup="menu"
                    class="flex items-center gap-2 rounded-full border border-gray-200 p-1 pr-3 text-gray-700 hover:bg-gray-100 dark:border-gray-800 dark:text-gray-300 dark:hover:bg-gray-800"
                    aria-label="User menu"
                >
                    <img class="h-8 w-8 rounded-full object-cover" src="/images/user/owner.jpg" alt="User avatar" />
                    <span class="hidden text-sm font-medium sm:block">Admin</span>
                </button>

                @if (isUserMenuOpen()) {
                    <div
                        role="menu"
                        class="absolute right-0 z-40 mt-2 w-44 rounded-xl border border-gray-200 bg-white p-1.5 shadow-theme-lg dark:border-gray-800 dark:bg-gray-900"
                    >
                        <button
                            type="button"
                            (click)="logout()"
                            role="menuitem"
                            class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-white/[0.05]"
                        >
                            <svg lucideLogOut class="h-4 w-4"></svg>
                            Log out
                        </button>
                    </div>
                }
            </div>
        </div>
    </div>
</header>
