<div class="flex flex-wrap items-center justify-between gap-3 mb-6">
    <h2 class="text-xl font-semibold text-gray-800 dark:text-white/90">
        {{ current()?.label }}
    </h2>
    <nav>
        <ol class="flex items-center gap-1.5">
            <li>
                <a class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400" routerLink="/">
                    Home
                    <svg lucideChevronRight class="h-4 w-4"></svg>
                </a>
            </li>

            @for (item of items(); track $index; let last = $last) {
                <li class="inline-flex items-center gap-1.5">
                    @if (!last && item.link) {
                        <a
                            [routerLink]="item.link"
                            class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400"
                        >
                            {{ item.label }}
                        </a>
                        <svg lucideChevronRight class="h-4 w-4 text-gray-400 dark:text-gray-600"></svg>
                    } @else {
                        <span class="text-sm text-gray-800 dark:text-white/90">{{ item.label }}</span>
                    }
                </li>
            }
        </ol>
    </nav>
</div>
