<form (submit)="onSubmit($event)" class="max-w-md">
    <label for="project-name" class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300">Name</label>
    <input
        id="project-name"
        type="text"
        [value]="name()"
        (input)="onInput($event)"
        placeholder="my-project"
        autocomplete="off"
        class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm text-gray-800 outline-none focus:border-brand-500 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
    />

    <div class="mt-4 flex gap-2">
        <button
            type="submit"
            [disabled]="submitting() || !name().trim()"
            class="rounded-lg bg-brand-500 px-4 py-2.5 text-sm font-medium text-white hover:bg-brand-600 disabled:opacity-50"
        >
            {{ submitLabel() }}
        </button>
        <a
            routerLink="/projects"
            class="rounded-lg border border-gray-300 px-4 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-800"
        >
            Cancel
        </a>
    </div>
</form>
