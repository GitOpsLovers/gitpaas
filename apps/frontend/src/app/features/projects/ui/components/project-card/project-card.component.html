<div
    class="group relative flex min-h-36 cursor-pointer flex-col rounded-xl border border-gray-200 bg-white p-5 transition hover:border-gray-300 dark:border-gray-800 dark:bg-white/[0.03] dark:hover:border-gray-700"
>
    <div class="flex items-start justify-between gap-3">
        <button
            type="button"
            (click)="view.emit(project())"
            [title]="project().name"
            class="min-w-0 max-w-full truncate text-left text-base font-medium text-gray-800 after:absolute after:inset-0 group-hover:text-brand-500 focus-visible:outline-none dark:text-white/90 dark:group-hover:text-brand-400"
        >
            {{ project().name }}
        </button>

        <app-dropdown class="relative z-10 shrink-0">
            <button
                type="button"
                (click)="edit.emit(project())"
                role="menuitem"
                class="block w-full rounded-lg px-3 py-2 text-left text-sm font-medium text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-white/[0.05]"
            >
                Edit
            </button>
            <button
                type="button"
                (click)="delete.emit(project())"
                role="menuitem"
                class="block w-full rounded-lg px-3 py-2 text-left text-sm font-medium text-error-500 hover:bg-error-50 dark:hover:bg-error-500/10"
            >
                Delete
            </button>
        </app-dropdown>
    </div>

    @if ((project().servicesCount ?? 0) > 0) {
        <span
            class="mt-auto inline-flex w-fit items-center rounded-full bg-brand-50 px-2.5 py-0.5 text-xs font-medium text-brand-600 dark:bg-brand-500/15 dark:text-brand-400"
        >
            {{ project().servicesCount }} {{ project().servicesCount === 1 ? 'service' : 'services' }}
        </span>
    }
</div>
