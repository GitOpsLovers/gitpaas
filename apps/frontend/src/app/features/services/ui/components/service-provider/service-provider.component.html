<app-component-card title="Provider">
    <form class="space-y-6" (submit)="onSubmit($event)">
        <div>
            <app-label>GitHub repository</app-label>
            <app-select2
                [options]="repositoryOptions()"
                [value]="repositoryId()"
                (valueChange)="onRepositoryChange($event)"
                [disabled]="repositories.isLoading()"
                [placeholder]="repositories.isLoading() ? 'Loading repositories…' : 'Select a repository…'"
                searchPlaceholder="Search repositories…"
            />
            @if (repositories.error()) {
                <p class="mt-1.5 text-xs text-error-500">
                    Could not load repositories. Check the GitHub App configuration.
                </p>
            }
        </div>

        <div>
            <app-label>Deployment branch</app-label>
            <app-select2
                [options]="branchOptions()"
                [(value)]="branch"
                [disabled]="!repositoryId() || branches.isLoading()"
                [placeholder]="branches.isLoading() ? 'Loading branches…' : 'Select a branch…'"
                searchPlaceholder="Search branches…"
            />
        </div>

        <div>
            <app-label for="provider-compose-path">Docker Compose path</app-label>
            <app-input-field
                id="provider-compose-path"
                name="provider-compose-path"
                placeholder="docker-compose.yml"
                [value]="composerPath()"
                (valueChange)="onComposerPathChange($event)"
            />
        </div>

        <app-button type="submit" [disabled]="saving()">
            {{ saving() ? 'Saving…' : 'Save' }}
        </app-button>
    </form>
</app-component-card>
