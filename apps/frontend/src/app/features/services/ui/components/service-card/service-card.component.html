<div
    class="relative flex min-h-36 items-start justify-between gap-3 rounded-xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]"
>
    <h3 class="truncate text-base font-medium text-gray-800 dark:text-white/90" [title]="service().name">
        {{ service().name }}
    </h3>

    <app-dropdown>
        <button
            type="button"
            (click)="edit.emit(service())"
            role="menuitem"
            class="block w-full rounded-lg px-3 py-2 text-left text-sm font-medium text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-white/[0.05]"
        >
            Edit
        </button>
        <button
            type="button"
            (click)="delete.emit(service())"
            role="menuitem"
            class="block w-full rounded-lg px-3 py-2 text-left text-sm font-medium text-error-500 hover:bg-error-50 dark:hover:bg-error-500/10"
        >
            Delete
        </button>
    </app-dropdown>
</div>
