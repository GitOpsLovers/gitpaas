<app-component-card
    title="Deploy Actions"
    desc="Trigger, reload or stop a deployment of this service on the VPS."
>
    <div class="flex flex-wrap gap-3">
        <app-button variant="primary" size="sm" [disabled]="deploying()" (btnClick)="requestDeploy()">
            <svg lucideRocket class="h-4 w-4"></svg>
            {{ deploying() ? 'Deploying…' : 'Deploy' }}
        </app-button>
        <app-button variant="outline" size="sm">
            <svg lucideRotateCw class="h-4 w-4"></svg>
            Reload
        </app-button>
        <app-button variant="danger" size="sm">
            <svg lucideCircleStop class="h-4 w-4"></svg>
            Stop
        </app-button>
        <app-button variant="dark" size="sm">
            <svg lucideTerminal class="h-4 w-4"></svg>
            Open Terminal
        </app-button>
    </div>

    <app-confirm-modal
        [open]="confirmOpen()"
        title="Launch deployment?"
        message="Are you sure you want to trigger a new deployment for this service?"
        confirmText="Deploy"
        cancelText="Cancel"
        variant="primary"
        (confirmed)="confirmDeploy()"
        (cancelled)="confirmOpen.set(false)"
    />
</app-component-card>
