<app-component-card
    title="Logs"
    desc="Runtime output from this service's containers."
>
    <div class="overflow-x-auto rounded-lg bg-gray-900 p-4 font-mono text-xs leading-relaxed">
        @for (log of logs; track $index) {
            <div class="flex gap-3 whitespace-nowrap">
                <span class="text-gray-500">{{ log.time }}</span>
                <span class="w-12 shrink-0 font-semibold" [class]="logLevelClass(log.level)">
                    {{ log.level }}
                </span>
                <span class="text-gray-300">{{ log.message }}</span>
            </div>
        }
    </div>
</app-component-card>
