<app-modal [open]="open()" [showCloseButton]="false" className="max-w-5xl p-6" (closed)="close()">
    @if (deployment(); as deployment) {
        <div class="mb-4 flex items-center gap-3">
            <h4 class="text-lg font-semibold text-gray-800 dark:text-white/90">Deployment log</h4>

            <span class="rounded-full px-2.5 py-0.5 text-xs font-medium capitalize" [class]="statusBadgeClass()">
                {{ status() }}
            </span>

            @if (streaming()) {
                <svg lucideLoaderCircle class="h-4 w-4 animate-spin text-gray-400"></svg>
            }

            <button
                type="button"
                class="ml-auto flex h-8 w-8 items-center justify-center rounded-full text-gray-400 transition-colors hover:bg-gray-100 hover:text-gray-700 dark:hover:bg-gray-800 dark:hover:text-white"
                aria-label="Close"
                (click)="close()"
            >
                <svg lucideX class="h-5 w-5"></svg>
            </button>
        </div>

        <div
            #logBody
            class="h-[60vh] overflow-auto rounded-lg border border-gray-200 bg-gray-50 p-4 font-mono text-xs leading-relaxed text-gray-700 dark:border-gray-800 dark:bg-gray-800 dark:text-gray-300"
        >
            @for (line of lines(); track $index) {
                <div class="whitespace-pre-wrap break-words">{{ line }}</div>
            } @empty {
                <div class="text-gray-400 dark:text-gray-500">
                    {{ streaming() ? 'Waiting for output…' : 'No log output available for this deployment.' }}
                </div>
            }
        </div>
    }
</app-modal>
