<app-modal [open]="open()" className="max-w-5xl p-6" (closed)="close()">
    @if (deployment(); as deployment) {
        <div class="mb-4 flex items-center gap-3 pr-10">
            <h4 class="text-lg font-semibold text-gray-800 dark:text-white/90">Deployment log</h4>

            <span class="rounded-full px-2.5 py-0.5 text-xs font-medium capitalize" [class]="statusBadgeClass()">
                {{ status() }}
            </span>

            @if (streaming()) {
                <svg lucideLoaderCircle class="h-4 w-4 animate-spin text-gray-400"></svg>
            }

            <span class="ml-auto font-mono text-xs text-gray-400">{{ deployment.branch }}</span>
        </div>

        <div
            #logBody
            class="h-[60vh] overflow-auto rounded-lg bg-gray-900 p-4 font-mono text-xs leading-relaxed text-gray-300"
        >
            @for (line of lines(); track $index) {
                <div class="whitespace-pre-wrap break-words">{{ line }}</div>
            } @empty {
                <div class="text-gray-500">
                    {{ streaming() ? 'Waiting for output…' : 'No log output available for this deployment.' }}
                </div>
            }
        </div>
    }
</app-modal>
