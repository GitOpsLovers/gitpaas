<app-breadcrumb [items]="breadcrumb()" />

<app-tabs [tabs]="tabs" [activeId]="activeTab()" (activeIdChange)="activeTab.set($any($event))" />

<div class="mt-6">
    @switch (activeTab()) {
        @case ('general') {
            <app-service-deploy-actions class="mb-6 block" [deploying]="deploying()" (deploy)="deploy()" />
        }

        @case ('provider') {
            <app-service-provider
                [initial]="providerSettings()"
                [saving]="savingProvider()"
                (save)="saveProvider($event)"
            />
        }

        @case ('deployments') {
            <app-service-deployments
                [deployments]="deployments.value() ?? []"
                [loading]="deployments.isLoading()"
                (view)="viewDeployment($event)"
                (delete)="deleteDeployment($event)"
            />
        }

        @case ('logs') {
            <app-service-logs />
        }
    }
</div>

<app-deployment-logs-modal
    [open]="logModalOpen()"
    [deployment]="selectedDeployment()"
    (closed)="logModalOpen.set(false)"
/>
