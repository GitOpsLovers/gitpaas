@if (loading()) {
    <p class="text-sm text-gray-500 dark:text-gray-400">Loading…</p>
} @else {
    <app-service-form
        [projectId]="projectId"
        [initialName]="initialName()"
        submitLabel="Save changes"
        [submitting]="submitting()"
        (save)="update($event)"
    />
}
