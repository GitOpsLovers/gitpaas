<div class="mb-6">
  <h1 class="text-2xl font-semibold text-gray-800 dark:text-white/90">Dashboard</h1>
  <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Theme migration preview.</p>
</div>

<!-- Stat cards -->
<div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
  @for (stat of stats; track stat.title) {
    <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03]">
      <span class="text-sm text-gray-500 dark:text-gray-400">{{ stat.title }}</span>
      <div class="mt-2 flex items-end justify-between">
        <h3 class="text-2xl font-bold text-gray-800 dark:text-white/90">{{ stat.value }}</h3>
        <span
          class="rounded-full px-2 py-0.5 text-xs font-medium"
          [class]="stat.up
            ? 'bg-success-50 text-success-600 dark:bg-success-500/15 dark:text-success-500'
            : 'bg-error-50 text-error-600 dark:bg-error-500/15 dark:text-error-500'"
        >
          {{ stat.delta }}
        </span>
      </div>
    </div>
  }
</div>

<!-- Content cards -->
<div class="mt-6 grid grid-cols-1 gap-6 lg:grid-cols-3">
  <div class="lg:col-span-2">
    <app-component-card title="Deployment resource usage" desc="CPU utilisation across running services">
      <div class="space-y-5">
        @for (item of usage; track item.name) {
          <div>
            <div class="mb-1.5 flex items-center justify-between">
              <span class="text-sm font-medium text-gray-700 dark:text-gray-300">{{ item.name }}</span>
              <span class="text-sm text-gray-500 dark:text-gray-400">{{ item.value }}%</span>
            </div>
            <div class="h-2 w-full overflow-hidden rounded-full bg-gray-100 dark:bg-gray-800">
              <div class="h-full rounded-full bg-brand-500" [style.width.%]="item.value"></div>
            </div>
          </div>
        }
      </div>
    </app-component-card>
  </div>

  <app-component-card title="Theme check" desc="Toggle light/dark from the header">
    <div class="flex flex-wrap gap-2">
      <button class="rounded-lg bg-brand-500 px-4 py-2.5 text-sm font-medium text-white hover:bg-brand-600">
        Primary
      </button>
      <button class="rounded-lg bg-success-500 px-4 py-2.5 text-sm font-medium text-white hover:bg-success-600">
        Success
      </button>
      <button class="rounded-lg bg-error-500 px-4 py-2.5 text-sm font-medium text-white hover:bg-error-600">
        Danger
      </button>
      <button
        class="rounded-lg border border-gray-300 px-4 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-800"
      >
        Secondary
      </button>
    </div>
  </app-component-card>
</div>
