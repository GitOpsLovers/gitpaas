<div class="pointer-events-none fixed top-6 right-6 z-99999 flex w-full max-w-sm flex-col gap-4">
    @for (toast of toasts(); track toast.id) {
        <div
            class="toast-item pointer-events-auto flex items-start gap-3 rounded-xl border border-l-4 bg-white p-4 shadow-theme-lg dark:bg-gray-900"
            [class]="containerClasses(toast.variant)"
            role="alert"
        >
            <div class="-mt-0.5 shrink-0" [class]="iconClasses(toast.variant)">
                @switch (toast.variant) {
                    @case ('success') {
                        <svg lucideCircleCheck class="h-6 w-6"></svg>
                    }
                    @case ('error') {
                        <svg lucideCircleX class="h-6 w-6"></svg>
                    }
                    @case ('warning') {
                        <svg lucideTriangleAlert class="h-6 w-6"></svg>
                    }
                    @default {
                        <svg lucideInfo class="h-6 w-6"></svg>
                    }
                }
            </div>

            <div class="min-w-0 flex-1">
                <h4 class="text-sm font-semibold text-gray-800 dark:text-white/90">{{ toast.title }}</h4>

                @if (toast.message) {
                    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">{{ toast.message }}</p>
                }
            </div>

            <button
                type="button"
                class="-mt-0.5 -mr-1 shrink-0 rounded-lg p-1 text-gray-400 transition hover:bg-gray-100 hover:text-gray-700 dark:hover:bg-white/[0.05] dark:hover:text-gray-300"
                aria-label="Close"
                (click)="dismiss(toast)"
            >
                <svg lucideX class="h-4 w-4"></svg>
            </button>
        </div>
    }
</div>
