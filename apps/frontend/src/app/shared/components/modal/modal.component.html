@if (open()) {
    <div class="pointer-events-none fixed inset-0 z-99999 flex items-center justify-center overflow-y-auto p-4">
        @if (backdrop()) {
            <div class="pointer-events-auto fixed inset-0 h-full w-full bg-gray-400/50 backdrop-blur-[32px]" (click)="close()"></div>
        }

        <div class="pointer-events-auto relative w-full rounded-3xl bg-white shadow-theme-lg dark:bg-gray-900" [class]="className()">
            @if (showCloseButton()) {
                <button
                    type="button"
                    class="absolute right-3 top-3 z-999 flex h-9.5 w-9.5 items-center justify-center rounded-full bg-gray-100 text-gray-400 transition-colors hover:bg-gray-200 hover:text-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white sm:right-6 sm:top-6 sm:h-11 sm:w-11"
                    aria-label="Close"
                    (click)="close()"
                >
                    <svg lucideX class="h-6 w-6"></svg>
                </button>
            }

            <ng-content></ng-content>
        </div>
    </div>
}
