# Static SPA server for the built Angular frontend.
#
# Runs under nginx-unprivileged (non-root), which listens on 8080 by default.
# The single-page app is served with a history-API fallback so client-side
# routes resolve to index.html, and hashed build assets are cached aggressively.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Lightweight liveness endpoint for container/orchestrator health checks.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Long-lived caching for content-hashed assets emitted by `ng build`.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown paths return the app shell so Angular routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
