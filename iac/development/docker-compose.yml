# Local development stack.
#
# - vps:      a Docker-in-Docker (DinD) container that acts as the remote VPS
#             where Artifactory deploys applications. The backend app (running on
#             this host) talks to its Docker daemon through Dockerode over TLS.
#             Everything Artifactory deploys lives inside this container.
# - postgres: the application's own database, where Artifactory persists its
#             operations (projects, deployments, ...). On first init of a fresh
#             volume it seeds an initial admin user for the app login
#             (admin@artifactory.com / artifactory). In production this same
#             database runs on the VPS.
# - pgadmin:  a web UI to inspect and query the local postgres. Reachable at
#             http://127.0.0.1:5050 (login admin@artifactory.com / artifactory);
#             the local database server is pre-registered via pgadmin/servers.json.
# - redis:    in-memory store used to buffer and fan-out real-time deployment logs.
#             The backend RPUSHes captured `docker-compose up` output here and streams
#             it to the browser over SSE. In production this same store runs on the VPS.
# - redisinsight: a web UI to inspect the local Redis. Reachable at
#             http://127.0.0.1:5540; the local redis server is pre-connected via
#             RI_REDIS_* env vars, so it opens ready-to-browse with no login.
#
# Paths are relative to this file (iac/development/); certs and state live under
# the repo-root `.dev/` directory.
name: artifactory-dev

services:
  vps:
    image: docker:29.6.1-dind-alpine3.24
    container_name: artifactory-vps
    privileged: true
    restart: unless-stopped
    environment:
      # Makes the daemon listen on tcp://0.0.0.0:2376 with TLS and drop the
      # generated client certificates under /certs/client.
      DOCKER_TLS_CERTDIR: /certs
    ports:
      - "127.0.0.1:2376:2376" # TLS Docker daemon — Dockerode connects here
      - "127.0.0.1:8080:80"   # reserved: reverse proxy (deployed apps) HTTP
      - "127.0.0.1:8443:443"  # reserved: reverse proxy (deployed apps) HTTPS
    volumes:
      # Client certs are shared to the host so the backend can authenticate.
      - ../../.dev/vps-certs:/certs
      # Persist the emulated VPS's images/volumes across restarts.
      - vps-data:/var/lib/docker
    healthcheck:
      test: ["CMD-SHELL", "docker -H unix:///var/run/docker.sock info >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:17.6-alpine3.22
    container_name: artifactory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: artifactory
      POSTGRES_PASSWORD: artifactory
      POSTGRES_DB: artifactory
    ports:
      - "127.0.0.1:5432:5432" # backend (on host) connects here
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Seed the initial admin user on first init. Postgres runs every script in
      # /docker-entrypoint-initdb.d ONCE, only when the data directory is empty —
      # i.e. on a fresh `postgres-data` volume. The script creates the `users`
      # table if absent (the backend builds its schema via TypeORM synchronize on
      # host boot) and inserts admin@artifactory.com. To re-seed later, run the
      # app's `pnpm seed:admin` or recreate the volume (`docker compose down -v`).
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artifactory -d artifactory"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.8.0-alpine3.23
    container_name: artifactory-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379" # backend (on host) connects here
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  pgadmin:
    image: elestio/pgadmin:REL-9_16
    container_name: artifactory-pgadmin
    restart: unless-stopped
    environment:
      # pgAdmin rejects special-use TLDs like `.local`, so use a normal domain.
      PGADMIN_DEFAULT_EMAIL: admin@artifactory.com
      PGADMIN_DEFAULT_PASSWORD: artifactory
      # Desktop mode: skip the login screen and master-password prompt for local dev.
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "127.0.0.1:5050:80" # web UI — open http://127.0.0.1:5050
    volumes:
      # Pre-register the local postgres server (connects to the `postgres` service).
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:3.6
    container_name: artifactory-redis-insight
    restart: unless-stopped
    environment:
      # Pre-register the local redis server so the UI opens ready-to-browse.
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: "6379"
      RI_REDIS_ALIAS: "Artifactory (local)"
    ports:
      - "127.0.0.1:5540:5540" # web UI — open http://127.0.0.1:5540
    depends_on:
      redis:
        condition: service_healthy

volumes:
  vps-data:
  postgres-data:
  pgadmin-data:
  redis-data:
