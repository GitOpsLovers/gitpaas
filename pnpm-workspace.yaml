packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  cpu-features: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  protobufjs: true
  ssh2: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@gitopslovers/eslint-config-multistack@1.16.2'
