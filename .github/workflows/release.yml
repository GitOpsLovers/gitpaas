name: Release

# Manually-triggered release. The pipeline is split in two:
#   1. `release`  — semantic-release computes the next version from the Conventional
#                   Commits since the last tag, creates the git tag + GitHub Release,
#                   and exposes whether a release happened plus the resolved version.
#   2. `publish`  — only when a release was actually published, builds and pushes the
#                   backend + frontend images to ghcr.io (multi-arch), tagged with the
#                   resolved version and `latest`, using first-class Docker actions.
on:
  workflow_dispatch:

# Least-privilege token scopes:
#   contents      — create the git tag and the GitHub Release
#   packages      — push images to ghcr.io
#   issues / PRs  — @semantic-release/github may comment on released issues/PRs
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    outputs:
      # Surfaced to the `publish` job to gate the build and to tag the images.
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # semantic-release needs full history + tags to determine the next version.
          fetch-depth: 0

      - name: Run semantic-release
        id: semantic
        # cycjimmy/semantic-release-action natively exposes `new_release_published`
        # and `new_release_version` as step outputs, and installs semantic-release +
        # its plugins in CI without touching the repo dependencies. semantic-release
        # is pinned to its v24 major line; extra plugins are passed ad-hoc.
        uses: cycjimmy/semantic-release-action@v6.0.0
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish ${{ matrix.name }} image
    needs: release
    # Only build & push when semantic-release actually cut a new release.
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: iac/production/backend.Dockerfile
            image: ghcr.io/gitopslovers/artifactory-backend
          - name: frontend
            dockerfile: iac/production/frontend.Dockerfile
            image: ghcr.io/gitopslovers/artifactory-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          # Tag with the exact resolved release version and move `latest`.
          tags: |
            type=raw,value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            NODE_VERSION=26.1.0
            PNPM_VERSION=11.1.3
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the GitHub Actions cache per image so backend/frontend don't collide.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: true
          sbom: true
