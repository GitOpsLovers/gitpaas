name: Release

# Manually-triggered release. The pipeline is split in two:
#   1. `release`  — semantic-release computes the next version from the Conventional
#                   Commits since the last tag, creates the git tag + GitHub Release,
#                   and exposes whether a release happened plus the resolved version.
#   2. `publish`  — only when a release was actually published, builds and pushes the
#                   backend + frontend images to ghcr.io (multi-arch), tagged with the
#                   resolved version and `latest`, using first-class Docker actions.
on:
  workflow_dispatch:

# Least-privilege token scopes:
#   contents      — create the git tag and the GitHub Release
#   packages      — push images to ghcr.io
#   issues / PRs  — @semantic-release/github may comment on released issues/PRs
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    outputs:
      # Surfaced to the `publish` job to gate the build and to tag the images.
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # semantic-release needs full history + tags to determine the next version.
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.3

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 26.1.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run semantic-release natively. All plugins + the conventionalcommits preset are
      # pinned in package.json (installed above), so the toolchain is deterministic —
      # no runtime plugin resolution.
      #
      # Changelog wiring (from .releaserc.json): @semantic-release/release-notes-generator
      # builds the list of changes since the previous tag (configured with the
      # `conventionalcommits` preset for grouped, linked notes with a compare link).
      # @semantic-release/changelog writes/updates a persistent CHANGELOG.md in the repo
      # root from those notes, @semantic-release/github publishes the notes as the GitHub
      # Release body, and @semantic-release/git commits the updated CHANGELOG.md back to
      # the repo (with a `chore(release): … [skip ci]` message) — so every release both
      # carries an auto-generated changelog and persists it in version control.
      #
      # The preset is PINNED to 9.3.1 in package.json: semantic-release@24 bundles
      # release-notes-generator@14 / commit-analyzer@13, which use
      # conventional-changelog-writer@8 (Handlebars string templates). The preset's
      # v10 line switched to function-based templates that require writer@9, so an
      # unpinned install (latest = v10) makes the notes writer emit an EMPTY body —
      # only the version header, no Features/Bug Fixes sections. 9.3.1 is the version
      # release-notes-generator@14 is tested against and renders the grouped sections.
      #
      # @semantic-release/exec (from .releaserc.json) runs during the `verifyRelease`
      # step — only when a release is actually being made — and writes
      # `new_release_version` / `new_release_published=true` to $GITHUB_OUTPUT, which
      # surface here as `steps.semantic.outputs.*`. When no release is cut, neither
      # output is set, so both resolve to empty and the `publish` gate stays false.
      - name: Run semantic-release
        id: semantic
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish ${{ matrix.name }} image
    needs: release
    # Only build & push when semantic-release actually cut a new release.
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: iac/production/backend.Dockerfile
            image: ghcr.io/gitopslovers/gitpaas-backend
          - name: frontend
            dockerfile: iac/production/frontend.Dockerfile
            image: ghcr.io/gitopslovers/gitpaas-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          # Tag with the exact resolved release version and move `latest`.
          tags: |
            type=raw,value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            NODE_VERSION=26.1.0
            PNPM_VERSION=11.1.3
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the GitHub Actions cache per image so backend/frontend don't collide.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: true
          sbom: true
